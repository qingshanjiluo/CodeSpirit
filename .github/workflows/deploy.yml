name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'                 # 自动使用根目录的 package-lock.json
        # cache-dependency-path 不需要指定，默认就是 ./package-lock.json
        
    - name: Install Dependencies
      run: npm ci                    # 直接在根目录执行
      
    - name: Build
      run: npm run build             # 构建输出到 dist/（Vite 默认）
      
    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: dist                 # 构建输出的目录
        branch: gh-pages
